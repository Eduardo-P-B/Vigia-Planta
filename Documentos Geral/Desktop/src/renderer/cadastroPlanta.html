<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vigia Planta - Nova Planta</title>
    <link rel="stylesheet" href="CSS/style-cadastroPlantas.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" href="images/Favicom.png" type="image/png">
</head>
<body>
    <div class="background-pattern"></div>

    <div class="main-wrapper">
        <main class="dashboard">
            <div class="cad-planta">
                <div class="hero-card-header">
                    <div class="header-title-section">
                        <i class="fas fa-seedling"></i>
                        <div>
                            <h1>Nova Planta</h1>
                            <p>Adicione uma planta ao seu jardim</p>
                        </div>
                    </div>
                    <div class="hero-card-header-btns">
                        <button class="action-btn" id="voltar-btn">
                            <i class="fa-regular fa-circle-left"></i>
                            <span>Voltar</span>
                        </button>
                    </div>
                </div>

                <form id="cadastro-planta-form">
                    <div class="form-two-columns">
                        <!-- Coluna da esquerda - Foto -->
                        <div class="form-column photo-column">
                            <div class="photo-upload-wrapper">
                                <div class="photo-preview" id="photoPreview">
                                    <div class="preview-placeholder">
                                        <i class="fas fa-cloud-upload-alt"></i>
                                        <span>Foto da planta</span>
                                        <small>Clique para adicionar</small>
                                    </div>
                                </div>

                                <input type="file" id="photoInput" class="photo-input" accept="image/*" style="display: none;">

                                <div class="photo-actions">
                                    <button type="button" class="camera-photo-btn" id="escolherImagemBtn">
                                        <i class="fas fa-camera"></i>
                                        <span>Câmera</span>
                                    </button>
                                    <button type="button" class="clear-photo-btn" id="clearPhotoBtn">
                                        <i class="fas fa-trash-alt"></i>
                                        <span>Limpar</span>
                                    </button>
                                </div>
                            </div>
                        </div>

                        <!-- Coluna da direita - Dados da planta -->
                        <div class="form-column data-column">
                            <div class="input-group">
                                <label class="input-label">
                                    <i class="fas fa-font"></i>
                                    Nome da Planta
                                </label>
                                <input type="text" class="input-field" placeholder="Ex: Croton (Externo)" name="nome" required>
                                <span class="input-hint">Dê um nome único para identificar sua planta</span>
                            </div>

                            <div class="input-group">
                                <label class="input-label">
                                    <i class="fas fa-tag"></i>
                                    Espécie
                                </label>
                                <div class="select-wrapper">
                                    <select class="input-field select-field" name="especie" required>
                                        <option value="" disabled selected>Selecione a espécie</option>
                                        <optgroup label="🌿 Plantas Folhagens">
                                            <option value="podocarpo">Podocarpo</option>
                                            <option value="costela">Costela de Adão</option>
                                            <option value="croton">Croton</option>
                                            <option value="lirio">Lírio da Paz</option>
                                        </optgroup>
                                        <optgroup label="🌵 Suculentas e Cactos">
                                            <option value="cacto">Cacto</option>
                                            <option value="suculenta">Suculenta</option>
                                        </optgroup>
                                        <optgroup label="🌸 Flores">
                                            <option value="rosa">Rosa</option>
                                        </optgroup>
                                    </select>
                                    <div class="select-arrow">
                                        <i class="fas fa-chevron-down"></i>
                                    </div>
                                </div>
                            </div>

                            <div class="input-group">
                                <label class="input-label">
                                    <i class="fas fa-map-marker-alt"></i>
                                    Localização
                                </label>
                                <input type="text" class="input-field" placeholder="Ex: Sala, Varanda, Jardim" name="localizacao">
                            </div>

                            <div class="input-row">
                                <div class="input-group half">
                                    <label class="input-label">
                                        <i class="fas fa-calendar"></i>
                                        Data de Plantio
                                    </label>
                                    <input type="date" class="input-field" name="data">
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Botões de ação -->
                    <div class="form-actions">
                        <button type="button" class="cancel-btn" id="cancelar-btn">
                            <i class="fas fa-times"></i>
                            Cancelar
                        </button>
                        <button type="submit" class="submit-plant-btn" id="salvar-btn">
                            <i class="fas fa-save"></i>
                            Salvar Planta
                        </button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script src="rendererCP.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Vigia Planta</title>
    <link rel="stylesheet" href="CSS/style-home.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" href="images/Favicom.png" type="image/png">
</head>

<body>
    <div class="background-pattern"></div>

    <!-- Sidebar Menu -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <img src="images/Favicom.png" height="30px">
            <h3>Vigia Planta</h3>
        </div>
        <nav class="sidebar-nav">
            <a href="Home.html" class="sidebar-link">
                <i class="fas fa-home"></i>
                <span>Início</span>
            </a>
            <a href="#" class="sidebar-link active">
                <i class="fas fa-seedling"></i>
                <span>Minhas Plantas</span>
            </a>
            <a href="#" class="sidebar-link">
                <i class="fas fa-chart-pie"></i>
                <span>Estatísticas</span>
            </a>
            <a href="#" class="sidebar-link">
                <i class="fa-regular fa-credit-card"></i>
                <span>Assinatura</span>
            </a>
            <a href="#" class="sidebar-link">
                <i class="fas fa-calendar-alt"></i>
                <span>Calendário</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <div class="user-info-sidebar">
                <img src="https://ui-avatars.com/api/?background=2E7D32&color=fff&name=Usuário+S&bold=true"
                    alt="Avatar">
                <div>
                    <p>Usuário</p>
                </div>
            </div>
            <button class="logout-btn" id="sair-btn">
                <i class="fas fa-sign-out-alt"></i>
                <span>Sair</span>
            </button>
        </div>
    </div>

    <!-- Overlay para mobile -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Conteúdo principal -->
    <div class="main-wrapper">
        <header class="top-bar">


            <div class="top-actions">
                <img src="images/LogoSemFundo.png" height="60rem">
                <button class="notifications-btn">
                    <i class="fas fa-bell"></i>
                    <span class="badge">3</span>
                </button>
                <div class="user-profile">
                    <img src="https://ui-avatars.com/api/?background=4CAF50&color=fff&name=Usuário+S&bold=true&length=2"
                        alt="Perfil">
                </div>
            </div>
        </header>

        <main class="dashboard">
            <!-- Hero Section -->
            <div class="hero-card" id="hero-card">
                <div class="hero-card-header">
                    <div class="header-left">
                        <h1>Suas Plantas 🍂:</h1>
                        <div class="search-container">
                            <div class="search-wrapper">
                                <i class="fas fa-search search-icon"></i>
                                <input type="text" id="inputBusca" class="search-input"
                                    placeholder="Buscar planta por nome">
                            </div>
                        </div>
                    </div>
                    <div class="hero-card-header-btns">
                        <button class="action-btn">
                            <i class="fa-solid fa-list"></i>
                            <span>Ordenar por: Atenção</span>
                        </button>
                        <button class="action-btn" id="nova-planta-btn">
                            <i class="fas fa-plus-circle"></i>
                            <span>Nova Planta</span>
                        </button>
                    </div>
                </div>
                <div class="plants-scroll-area">
                    <div class="metrics-grid" id="conteudo">

                    </div>
                </div>
            </div>
    </div>

    <script src="rendererMP.js"></script>
</body>

</html>

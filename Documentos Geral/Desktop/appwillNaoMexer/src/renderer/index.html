<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Painel de Controle</title>
    <!-- Importação do Bootstrap Offline -->
    <link href="../../node_modules/bootstrap/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<!-- TRAVANDO A JANELA: overflow-hidden e fundo cinza claro -->

<body class="overflow-hidden bg-light">

    <!-- d-flex (flexbox) e vh-100 (altura total) -->
    <div class="container-fluid vh-100 d-flex p-0">
        <!-- 1. MENU LATERAL (Com largura fixa) -->
        <div class="bg-dark text-white p-3 d-flex flex-column shadow z-2" style="width: 250px;">

            <h3 class="text-warning fw-bold mb-0">DevSystem</h3>
            <hr>

            <!-- Navegação usando Nav Pills do Bootstrap -->
            <ul class="nav nav-pills flex-column mb-auto">
                <li class="nav-item mb-2">
                    <a href="#" class="nav-link active bg-warning text-dark fw-bold">Home</a>
                </li>
                <li class="nav-item mb-2">
                    <a href="#" class="nav-link text-white">Clientes</a>
                </li>
            </ul>

        </div>
        <div class="flex-grow-1 d-flex flex-column bg-light">

            <!-- 2. HEADER: Fundo branco com sombra leve -->
            <header class="bg-white border-bottom p-3 d-flex justify-content-between align-items-center shadow-sm z-1">
                <h4 class="m-0 text-secondary">Página Inicial</h4>
                <span class="badge bg-secondary p-2">Admin</span>
            </header>

            <!-- 3. ÁREA DE CONTEÚDO (MAIN): overflow-auto (PERMITE ROLAR AQUI!) -->
            <main class="flex-grow-1 overflow-auto p-4">

                <h3 class="mb-4">Bem-vindo de volta!</h3>
                <div id="conteudo"> <!-- ID PARA O JS INJETAR OS DADOS DEPOIS -->
                    <div class="card shadow-sm h-100" style="min-height: 400px;">
                        <div class="card-body text-muted d-flex align-items-center justify-content-center">
                            Conteúdo em branco...
                        </div>
                    </div>
                </div>

            </main>

        </div>
    </div>

    <script src="renderer.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Vigia Planta</title>
    <link rel="stylesheet" href="style-login.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" href="Favicom.png" type="image/png">
</head>
<body>
    <div class="container">
        <div class="login-card">
            <div class="logo-section">
                <div class="logo-icon">
                    <img src="LogoSemFundoBranca.png" width="100">
                </div>
                <h1 class="logo-text">Vigia Planta</h1>
                <p class="tagline">Suas plantas na palma da mão</p>
                <h3 class="default-text">Entrar</h3>
            </div>

            <form class="login-form">
                <div class="input-group">
                    <label class="input-label">
                        <i class="fas fa-envelope"></i>
                        Email
                    </label>
                    <input type="email" class="input-field" placeholder="Digite seu email">
                </div>

                <div class="input-group">
                    <label class="input-label">
                        <i class="fas fa-lock"></i>
                        Senha
                    </label>
                    <div class="password-wrapper">
                        <input type="password" class="input-field" placeholder="Digite sua senha">
                        <button type="button" class="toggle-password">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox">
                        <span class="checkbox-custom"></span>
                        Lembrar-me
                    </label>
                    <a href="#" class="forgot-password">Esqueceu a senha?</a>
                </div>
                <a href="Home.html">Debug</a>
                <button type="submit" class="login-btn">
                    <i class="fas fa-sign-in-alt"></i>
                    Entrar
                </button>
            </form>

            <div class="signup-prompt">
                <p>Não tem uma conta? <a href="Cadastro.html">Criar conta</a></p>
            </div>

            <div class="plant-decoration">
                <div class="plant leaf-1"></div>
                <div class="plant leaf-2"></div>
                <div class="plant leaf-3"></div>
            </div>
        </div>
    </div>
</body>
</html>
